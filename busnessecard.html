<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
  <style>
    body {
  background-color: rosybrown;
  font-family: Arial, sans-serif;
}

.business-card {
  width: 300px;
  background-color: white;
  padding: 20px;
  margin-top: 100px;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
  font-size: 16px;
}

.profile-image {
  max-width: 100%;
}

p {
  margin-top: 5px;
  margin-bottom: 5px;
}

a {
  text-decoration: none;
}
  </style>

<body>

  <div class="business-card">

    <img 
      class="profile-image" 
      src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" 
      alt="Profile image showing a flower"
    >

    <p class="full-name">Elmi Osman</p>
    <p class="designation">Web Developer Student</p>
    <p class="company">My Portfolio</p>

    <hr>

    <p>elmi.osman@email.com</p>
    <p>+1 (612) 555-1234</p>

    <a class="portfolio-link" href="https://example.com" target="_blank">
      Portfolio
    </a>

    <hr>

    <div class="social-media">
      <h2>Connect with me</h2>

      <a href="https://twitter.com" target="_blank">Twitter</a>
      <a href="https://linkedin.com" target="_blank">LinkedIn</a>
      <a href="https://github.com" target="_blank">GitHub</a>
    </div>

  </div>

</body>
</html>
